# ============================================================
# 得分计算示例
# ============================================================
# 
# 示例1: 用户问 "我被裁员了怎么领失业金"
# 
# L1匹配: "失业金" 命中
#   得分 = 1.0(层级) × 0.9(词权重) = 0.9
#
# L2匹配: "领" 命中
#   得分 = 0.8(层级) × 0.8(词权重) × 0.9(关联权重) = 0.576
#
# L3匹配: "被裁员" 命中 (客体=工作, 动作=被辞退)
#   得分 = 0.6(层级) × 0.9(客体权重) × 0.95(动作权重) = 0.513
#
# 前提条件: "被裁员" → 提升1.3
#
# 总分 = (0.9 + 0.576 + 0.513) × 1.3 = 2.59
# 
# 结果: 高置信命中 "失业保险金申领"
# ============================================================
